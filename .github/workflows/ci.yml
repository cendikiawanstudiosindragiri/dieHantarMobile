name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm install
      - name: Lint (basic)
        run: node -e "console.log('lint placeholder')"
      - name: Run smoke tests
        run: |
          curl -s http://localhost:3000/api/pricing/surge || true
