
<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>dieHantar - Aplikasi Sultan</title>

    <!-- Libraries & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="app-styles.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:ital,wght@1,800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="sultan-app max-w-sm mx-auto">

        <!-- Main Content Area -->
        <main class="p-6">

            <!-- Page: Home -->
            <div id="page-home" class="page active space-y-8">
                <header id="app-header" class="flex justify-between items-center">
                    <div>
                        <p class="text-xs text-zinc-500">Lokasi Anda</p>
                        <h2 class="font-bold text-zinc-800">Indragiri Hilir <i class="fas fa-chevron-down text-xs"></i></h2>
                    </div>
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md">
                        <i class="fas fa-bell text-xl text-zinc-500"></i>
                    </div>
                </header>
                <div id="sultan-card" class="bg-zinc-900 text-white p-8 rounded-[2.5rem] shadow-2xl shadow-zinc-900/50">
                     <p class="text-sm text-zinc-400 font-montserrat italic">dieHantar Pay</p>
                     <p id="user-balance" class="text-3xl font-bold mt-2">Rp 0</p>
                     <div class="mt-6 flex justify-between items-center">
                        <p class="font-bold" id="user-name">Sultan</p>
                        <button class="bg-orange-500 text-white text-xs font-bold py-2 px-4 rounded-full">Top Up</button>
                     </div>
                </div>
                <div id="services-grid" class="grid grid-cols-4 gap-4 text-center">
                     <!-- Service items will be injected by app.js -->
                </div>
            </div>

            <!-- Page: History -->
            <div id="page-history" class="page">
                <h1 class="text-2xl font-montserrat font-extrabold italic text-zinc-800">Riwayat Perjalanan</h1>
                <div class="mt-6 space-y-4" id="history-list-container">
                    <p class="text-zinc-500">Tidak ada riwayat perjalanan ditemukan.</p>
                    <!-- History items will be injected here -->
                </div>
            </div>

            <!-- Page: Profile (Sultan Edition) -->
            <div id="page-profile" class="page">
                <div class="text-center pt-4">
                    <img id="profile-avatar" src="https://i.pravatar.cc/150?u=sultan" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-lg">
                    <h2 id="profile-name" class="text-2xl font-extrabold mt-4 text-zinc-800">Sultan Rama Kirana</h2>
                    <p id="profile-email" class="text-zinc-500">sultan@cendikiawanstudios.com</p>
                </div>
                <div class="mt-8 space-y-4">
                    <div class="bg-zinc-900 p-6 rounded-[2.5rem]">
                        <p class="text-sm text-zinc-400">ID Karyawan Sambu Group</p>
                        <p id="employee-id" class="text-lg font-bold text-white">SBU-12345678</p>
                    </div>
                    <div class="bg-zinc-900 p-6 rounded-[2.5rem]">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm text-zinc-400">Poin Loyalitas Sultan</p>
                                <p id="loyalty-points" class="text-2xl font-extrabold text-orange-500">1,250 Poin</p>
                            </div>
                            <i class="fas fa-crown text-3xl text-orange-500/50"></i>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-[2.5rem] space-y-1">
                        <a href="#" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-100 transition-colors"><i class="fas fa-user-edit text-xl text-zinc-400"></i><span class="font-bold text-zinc-800">Edit Profil</span></a>
                         <a href="#" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-100 transition-colors"><i class="fas fa-shield-alt text-xl text-zinc-400"></i><span class="font-bold text-zinc-800">Keamanan</span></a>
                         <a href="#" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-zinc-100 transition-colors"><i class="fas fa-question-circle text-xl text-zinc-400"></i><span class="font-bold text-zinc-800">Pusat Bantuan</span></a>
                    </div>
                    <button onclick="App.logout()" class="w-full mt-4 bg-red-600/10 text-red-600 py-4 rounded-2xl font-bold text-lg">Keluar</button>
                </div>
            </div>

        </main>

        <!-- Floating Bottom Navigation -->
        <nav id="bottom-nav" class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-[calc(24rem-2rem)] bg-white/80 backdrop-blur-xl p-4 rounded-3xl shadow-lg flex justify-around items-center z-50">
             <!-- Nav items injected here -->
        </nav>
    </div>

    <!-- Firebase & App Logic -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
