
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masuk - dieHantar Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:ital,wght@1,800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950">

    <div class="min-h-screen bg-zinc-950 flex flex-col justify-center p-8">
        <div class="text-center mb-10 fade-in">
            <h1 class="font-montserrat text-3xl font-extrabold italic text-white tracking-tighter">dieHantar <span class="text-orange-500">MOBILE</span></h1>
            <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.4em] mt-2">Powered by Cendikiawan Studios</p>
        </div>
    
        <div class="bg-zinc-900/50 border border-white/5 p-8 rounded-[2.5rem] backdrop-blur-xl shadow-2xl">
            <div id="auth-title" class="mb-8">
                <h2 class="font-montserrat text-xl font-extrabold italic text-white">Selamat Datang, Sultan!</h2>
                <p class="text-[9px] text-zinc-400 uppercase font-bold mt-1">Masuk untuk memulai perjalanan.</p>
            </div>
    
            <form id="auth-form" class="space-y-4">
                <input type="text" id="fullname" placeholder="Nama Lengkap Sultan" class="hidden w-full bg-zinc-800 border-none rounded-2xl p-5 text-white text-xs font-bold focus:ring-2 focus:ring-orange-500 transition-all">
                <input type="email" id="email" placeholder="Email Sultan" required class="w-full bg-zinc-800 border-none rounded-2xl p-5 text-white text-xs font-bold focus:ring-2 focus:ring-orange-500 transition-all">
                <input type="password" id="password" placeholder="Password" required class="w-full bg-zinc-800 border-none rounded-2xl p-5 text-white text-xs font-bold focus:ring-2 focus:ring-orange-500 transition-all">
                
                <button type="submit" id="btn-auth" class="w-full py-5 bg-orange-500 text-white rounded-2xl font-black uppercase text-[10px] shadow-lg shadow-orange-500/20 active:scale-95 transition-all mt-4">
                    Masuk Sekarang
                </button>
            </form>
    
            <div class="mt-8 text-center">
                <button onclick="AuthManager.toggleMode()" id="toggle-text" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest hover:text-white transition-all">
                    Belum punya akun? <span class="text-orange-500">Daftar Sultan</span>
                </button>
            </div>
        </div>
    
        <div class="mt-12 text-center opacity-30">
            <p class="text-[7px] text-zinc-400 font-bold uppercase tracking-[0.2em]">Kemitraan Eksklusif: Sambu Group & Cendikiawan Studios</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>

    <!-- Firebase Config & Logic -->
    <script src="firebase.js"></script>
    <script src="auth-logic.js"></script>
</body>
</html>
