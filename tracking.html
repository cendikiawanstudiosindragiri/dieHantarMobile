<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Order Tracking - Sultan Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:ital,wght@1,700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #18181b; color: white; }
        #map { height: 100vh; width: 100%; }
        .info-card { border-radius: 2.5rem; }
        .sultan-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); }
        .sos-btn { border-radius: 2.5rem; }
    </style>
</head>
<body class="max-w-sm mx-auto overflow-hidden">

    <!-- Google Map Container -->
    <div id="map" class="absolute top-0 left-0 z-0"></div>

    <!-- Top Overlay UI -->
    <div class="relative z-10 p-5 flex justify-between items-center">
        <button onclick="history.back()" class="w-12 h-12 bg-white/10 backdrop-blur-lg rounded-full flex items-center justify-center sultan-shadow">
            <i class="fas fa-arrow-left text-white"></i>
        </button>
        <h2 class="text-white font-bold text-lg">Lacak Pesanan</h2>
        <div class="w-12"></div>
    </div>
    
    <!-- Bottom Info Card & SOS -->
    <div class="absolute bottom-0 left-0 w-full p-5 z-10 space-y-4">
        <!-- Driver Info Card -->
        <div id="driver-card" class="info-card bg-zinc-900/80 backdrop-blur-xl p-6 text-white sultan-shadow">
            <div class="flex items-center gap-4">
                <img id="driver-photo" src="https://i.pravatar.cc/150?u=driver1" alt="Driver" class="w-16 h-16 rounded-2xl object-cover">
                <div>
                    <p class="text-zinc-400 text-sm">Driver Anda</p>
                    <p id="driver-name" class="font-bold text-xl">Memuat...</p>
                    <p id="driver-vehicle" class="text-zinc-300 text-sm">... | ...</p>
                </div>
                <div class="ml-auto text-right">
                    <p class="text-zinc-400 text-sm">Rating</p>
                    <p id="driver-rating" class="font-bold text-xl"><i class="fas fa-star text-orange-400"></i> 5.0</p>
                </div>
            </div>
        </div>

        <!-- SOS Button -->
        <button class="sos-btn bg-rose-600 w-full py-5 text-white font-bold text-lg uppercase tracking-wider flex items-center justify-center gap-3 sultan-shadow">
            <i class="fas fa-exclamation-triangle"></i>
            <span>SOS</span>
        </button>
    </div>

    <!-- Google Maps SDK -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry"></script>
    <!-- Tracking Engine -->
    <script type="module" src="tracking-engine.js"></script>

</body>
</html>
